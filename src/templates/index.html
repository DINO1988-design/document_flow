<!DOCTYPE html>
<html>
<head>
<title>Document AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1 class="mb-4">Document AI Upload</h1>

<!-- Upload -->
<div class="card p-3 mb-4">
<h4>Carica documento</h4>
<form action="/upload/" method="post" enctype="multipart/form-data">
<div class="mb-3">
<input type="file" name="file" class="form-control" required>
</div>
<button class="btn btn-primary">Upload</button>
</form>
</div>

<!-- Ricerca AI -->
<div class="card p-3 mb-4">
<h4>Ricerca AI</h4>
<div class="input-group mb-3" style="max-width:500px;">
<input id="aiSearch" type="text" class="form-control" placeholder="Es: passaporti italiani, nome Mario...">
<button class="btn btn-success" onclick="searchAI()" type="button">Cerca</button>
</div>
</div>

<!-- Risultati -->
<div class="card p-3 mb-4">
<h4>Risultati ricerca</h4>
<table id="resultsTable" class="table table-bordered table-striped">
<thead>
<tr>
<th>ID</th>
<th>Tipo</th>
<th>File</th>
<th>Data creazione</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
async function searchAI(){
    const query = document.getElementById("aiSearch").value.trim();
    if(!query){ alert("Inserisci una ricerca"); return; }

    const res = await fetch("/search_ai/?query=" + encodeURIComponent(query));
    const data = await res.json();

    const tbody = document.querySelector("#resultsTable tbody");
    tbody.innerHTML = "";

    data.results.forEach(doc => {
        const filename = doc.file_path.split("/").pop();
        tbody.innerHTML += `
        <tr>
            <td>${doc.id}</td>
            <td>${doc.tipo_documento}</td>
            <td><a href="/uploads/${filename}" target="_blank">${filename}</a></td>
            <td>${doc.data_creazione}</td>
        </tr>
        `;
    });
}
</script>

</body>
</html>
